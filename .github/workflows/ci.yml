name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Qualité : lint (ruff) + imports. Le "quality gate".
  # ---------------------------------------------------------------------------
  quality:
    name: Qualité (lint + vérification imports)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances (projet + dev)
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Formatage (ruff format)
        run: uv run ruff format --check src/

      - name: Vérification des imports
        run: PYTHONPATH=src uv run python -c "from mlproject.config import TARGET; from mlproject.data import load_data; from mlproject.features import build_preprocessor; print('imports OK')"

  # ---------------------------------------------------------------------------
  # 2. Entraînement : entraîne la baseline et publie le modèle en artefact
  #    (Continuous Training). Ne tourne que si quality est vert.
  # ---------------------------------------------------------------------------
  train:
    name: Entraînement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dépendances
        run: uv sync

      - name: Entraînement de la baseline
        run: PYTHONPATH=src uv run python -m mlproject.train
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      - name: Publication du modèle en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
