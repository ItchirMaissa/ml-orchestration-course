# Stack complète - Heart Disease Classifier
# Séance 14 - Docker Compose
#
# Commandes :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api frontend
#   -> API sur http://localhost:8000, frontend sur http://localhost:8501

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
      --dev
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    # S14-1 : exposer le port 8000
    ports:
      - "8000:8000"
    # S14-2 : volume models_data en lecture seule pour lire le modèle
    volumes:
      - models_data:/app/models:ro
    # S14-3 : healthcheck sur GET /health
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # S14-4 : URL de l'API via le DNS interne Docker Compose
    environment:
      API_URL: http://api:8000
    # S14-5 : exposer le port 8501
    ports:
      - "8501:8501"
    # S14-6 : attendre que l'API soit healthy avant de démarrer
    depends_on:
      api:
        condition: service_healthy

  airflow:
    image: apache/airflow:2.9.1
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "mlops-esgi-secret"
      PYTHONPATH: /opt/airflow/src
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - models_data:/opt/airflow/models
      - airflow_data:/opt/airflow
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - airflow

volumes:
  mlflow_data:
  models_data:
  airflow_data:
